<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Timeline - Verification Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --cruise: #388bfd;
            --flight: #a371f7;
            --hotel: #d29922;
            --home: #3fb950;
            --transit: #768390;
            --unknown: #d29922;
            --amber: #d29922;
            --amber-bg: rgba(210, 153, 34, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .header-links a {
            color: var(--cruise);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .header-links a:hover { text-decoration: underline; }

        .filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            width: 220px;
        }

        .search-box:focus { outline: none; border-color: var(--cruise); }

        select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
        }

        select:focus { outline: none; border-color: var(--cruise); }

        .stats {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            gap: 2rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .stat-item strong { color: var(--text); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .trip-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: grid;
            grid-template-columns: 4px 1fr auto;
            gap: 1rem;
            align-items: center;
            transition: border-color 0.2s;
        }

        .trip-card:hover { border-color: var(--text-muted); }

        .trip-card.low-confidence {
            border-color: var(--amber);
            background: var(--amber-bg);
        }

        .trip-card.unverified {
            border-left: 4px solid var(--amber);
        }

        .type-bar {
            width: 4px;
            height: 100%;
            min-height: 40px;
            border-radius: 2px;
        }

        .type-bar.cruise { background: var(--cruise); }
        .type-bar.flight { background: var(--flight); }
        .type-bar.hotel { background: var(--hotel); }
        .type-bar.home { background: var(--home); }
        .type-bar.transit { background: var(--transit); }
        .type-bar.unknown { background: var(--unknown); }

        .trip-info { min-width: 0; }

        .trip-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .trip-dates {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .trip-route {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .trip-route .country-code {
            font-weight: 600;
            color: var(--text);
        }

        .trip-meta {
            text-align: right;
            white-space: nowrap;
        }

        .trip-meta .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .badge.cruise { background: rgba(56, 139, 253, 0.2); color: var(--cruise); }
        .badge.flight { background: rgba(163, 113, 247, 0.2); color: var(--flight); }
        .badge.hotel { background: rgba(210, 153, 34, 0.2); color: var(--hotel); }
        .badge.home { background: rgba(63, 185, 80, 0.2); color: var(--home); }
        .badge.transit { background: rgba(118, 131, 144, 0.2); color: var(--transit); }
        .badge.unknown { background: rgba(210, 153, 34, 0.2); color: var(--unknown); }

        .badge.verified { background: rgba(63, 185, 80, 0.15); color: var(--home); }
        .badge.unverified { background: rgba(210, 153, 34, 0.15); color: var(--amber); }
        .badge.confidence-low { background: rgba(210, 153, 34, 0.3); color: var(--amber); }
        .badge.confidence-medium { background: rgba(210, 153, 34, 0.15); color: var(--amber); }

        .trip-booking {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .trip-notes {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
            font-style: italic;
        }

        .year-divider {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            margin: 1.5rem 0 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .gap-warning {
            background: rgba(210, 153, 34, 0.08);
            border: 1px dashed var(--amber);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.825rem;
            color: var(--amber);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .gap-warning::before { content: "⚠️"; }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .container { padding: 1rem; }
            .filters { gap: 0.5rem; }
            .search-box { width: 100%; }
            .trip-card { grid-template-columns: 4px 1fr; }
            .trip-meta { grid-column: 2; text-align: left; }
            .stats { padding: 0.75rem 1rem; gap: 1rem; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>🗺️ Travel Timeline - Verification Dashboard</h1>
            <div class="header-links">
                <a href="/data.json" target="_blank">📄 Raw JSON</a>
                <span style="color: var(--text-muted); font-size: 0.8rem;" id="last-updated"></span>
            </div>
        </div>
        <div class="filters">
            <input type="text" class="search-box" id="search" placeholder="Search trips, cities, booking refs...">
            <select id="filter-year">
                <option value="">All Years</option>
            </select>
            <select id="filter-type">
                <option value="">All Types</option>
                <option value="Cruise">Cruise</option>
                <option value="Flight">Flight</option>
                <option value="Hotel">Hotel</option>
                <option value="Home">Home</option>
                <option value="Transit">Transit</option>
                <option value="Unknown">Unknown</option>
            </select>
            <select id="filter-country">
                <option value="">All Countries</option>
            </select>
            <select id="filter-verified">
                <option value="">All Status</option>
                <option value="verified">Verified Only</option>
                <option value="unverified">Unverified Only</option>
                <option value="low">Low Confidence</option>
            </select>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="container" id="timeline"></div>

    <script>
        let allTrips = [];

        async function loadData() {
            try {
                const res = await fetch('/data.json');
                const data = await res.json();
                allTrips = data.trips || [];
                populateFilters();
                render();
            } catch (e) {
                document.getElementById('timeline').innerHTML =
                    '<div class="no-results">Failed to load data.json. Build may not have run yet.</div>';
                console.error(e);
            }
        }

        function populateFilters() {
            const years = [...new Set(allTrips.map(t => t.StartDate.substring(0, 4)))].sort();
            const yearSelect = document.getElementById('filter-year');
            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                yearSelect.appendChild(opt);
            });

            const countries = [...new Set(allTrips.flatMap(t => [t.StartCountryCode, t.EndCountryCode]).filter(Boolean))].sort();
            const countrySelect = document.getElementById('filter-country');
            countries.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                countrySelect.appendChild(opt);
            });
        }

        function getFiltered() {
            const search = document.getElementById('search').value.toLowerCase();
            const year = document.getElementById('filter-year').value;
            const type = document.getElementById('filter-type').value;
            const country = document.getElementById('filter-country').value;
            const verified = document.getElementById('filter-verified').value;

            return allTrips.filter(t => {
                if (year && !t.StartDate.startsWith(year)) return false;
                if (type && t.Type !== type) return false;
                if (country && t.StartCountryCode !== country && t.EndCountryCode !== country) return false;
                if (verified === 'verified' && !t.Verified) return false;
                if (verified === 'unverified' && t.Verified) return false;
                if (verified === 'low' && t.Confidence !== 'low') return false;
                if (search) {
                    const haystack = [t.Title, t.StartCity, t.EndCity, t.BookingRef, t.Notes, t.Carrier, t.TripId].join(' ').toLowerCase();
                    if (!haystack.includes(search)) return false;
                }
                return true;
            });
        }

        function daysBetween(d1, d2) {
            return Math.round((new Date(d2) - new Date(d1)) / (1000 * 60 * 60 * 24));
        }

        function formatDate(d) {
            if (!d) return '?';
            const date = new Date(d + 'T00:00:00');
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function render() {
            const trips = getFiltered();
            const container = document.getElementById('timeline');
            const stats = document.getElementById('stats');

            // Stats
            const totalTrips = trips.length;
            const unverified = trips.filter(t => !t.Verified).length;
            const lowConf = trips.filter(t => t.Confidence === 'low').length;
            const medConf = trips.filter(t => t.Confidence === 'medium').length;
            const countries = new Set(trips.flatMap(t => [t.StartCountryCode, t.EndCountryCode]).filter(Boolean));
            stats.innerHTML = `
                <span class="stat-item"><strong>${totalTrips}</strong> trips</span>
                <span class="stat-item"><strong>${countries.size}</strong> countries</span>
                <span class="stat-item"><strong>${unverified}</strong> unverified</span>
                <span class="stat-item"><strong>${medConf}</strong> medium confidence</span>
                <span class="stat-item"><strong>${lowConf}</strong> low confidence</span>
            `;

            if (trips.length === 0) {
                container.innerHTML = '<div class="no-results">No trips match your filters.</div>';
                return;
            }

            let html = '';
            let currentYear = '';

            for (let i = 0; i < trips.length; i++) {
                const t = trips[i];
                const tripYear = t.StartDate.substring(0, 4);

                // Year divider
                if (tripYear !== currentYear) {
                    currentYear = tripYear;
                    html += `<div class="year-divider">${currentYear}</div>`;
                }

                // Gap detection
                if (i > 0) {
                    const prevEnd = trips[i - 1].EndDate;
                    const currStart = t.StartDate;
                    if (prevEnd && currStart) {
                        const gap = daysBetween(prevEnd, currStart);
                        if (gap > 3 && trips[i-1].StartDate.substring(0,4) === tripYear) {
                            html += `<div class="gap-warning">${gap} day gap: ${formatDate(prevEnd)} to ${formatDate(currStart)}</div>`;
                        }
                    }
                }

                const typeClass = t.Type.toLowerCase();
                const isLowConf = t.Confidence === 'low' || t.Confidence === 'medium';
                const cardClasses = ['trip-card'];
                if (isLowConf && t.Confidence === 'low') cardClasses.push('low-confidence');
                if (!t.Verified) cardClasses.push('unverified');

                const duration = daysBetween(t.StartDate, t.EndDate);

                html += `
                    <div class="${cardClasses.join(' ')}">
                        <div class="type-bar ${typeClass}"></div>
                        <div class="trip-info">
                            <div class="trip-title">${t.Title}</div>
                            <div class="trip-dates">
                                ${formatDate(t.StartDate)} — ${formatDate(t.EndDate)}
                                <span style="color: var(--text-muted); font-size: 0.8rem;">(${duration} day${duration !== 1 ? 's' : ''})</span>
                            </div>
                            <div class="trip-route">
                                ${t.StartCity} <span class="country-code">${t.StartCountryCode}</span>
                                → ${t.EndCity} <span class="country-code">${t.EndCountryCode}</span>
                                ${t.Carrier ? ' · ' + t.Carrier : ''}
                            </div>
                            ${t.Notes ? `<div class="trip-notes">${t.Notes}</div>` : ''}
                        </div>
                        <div class="trip-meta">
                            <div><span class="badge ${typeClass}">${t.Type}</span></div>
                            <div><span class="badge ${t.Verified ? 'verified' : 'unverified'}">${t.Verified ? '✓ Verified' : '? Unverified'}</span></div>
                            ${t.Confidence !== 'high' ? `<div><span class="badge confidence-${t.Confidence}">${t.Confidence} conf.</span></div>` : ''}
                            ${t.BookingRef ? `<div class="trip-booking">${t.BookingRef}</div>` : ''}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Event listeners
        document.getElementById('search').addEventListener('input', render);
        document.getElementById('filter-year').addEventListener('change', render);
        document.getElementById('filter-type').addEventListener('change', render);
        document.getElementById('filter-country').addEventListener('change', render);
        document.getElementById('filter-verified').addEventListener('change', render);

        loadData();
    </script>
</body>
</html>
