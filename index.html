<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Timeline - Data Review</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --cruise: #388bfd;
  --flight: #a371f7;
  --hotel: #d29922;
  --home: #3fb950;
  --transit: #79c0ff;
  --unknown: #d29922;
  --unverified: #f85149;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 20px;
}

.header {
  max-width: 1400px;
  margin: 0 auto 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.header h1 {
  font-size: 24px;
  font-weight: 600;
}

.header .meta {
  color: var(--text-muted);
  font-size: 14px;
}

.header a {
  color: var(--cruise);
  text-decoration: none;
}

.controls {
  max-width: 1400px;
  margin: 0 auto 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.controls input, .controls select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
}

.controls input { flex: 1; min-width: 200px; }
.controls select { min-width: 120px; }

.stats {
  max-width: 1400px;
  margin: 0 auto 20px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  min-width: 120px;
}

.stat-card .value { font-size: 24px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }

.timeline {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.trip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 6px 1fr auto;
  gap: 16px;
  align-items: start;
  transition: border-color 0.2s;
}

.trip-card:hover { border-color: var(--text-muted); }

.trip-card.unverified { border-left: 3px solid var(--unverified); }
.trip-card.low-confidence { background: #1c1c0f; }

.type-indicator {
  width: 6px;
  border-radius: 3px;
  align-self: stretch;
  min-height: 40px;
}

.type-Cruise .type-indicator { background: var(--cruise); }
.type-Flight .type-indicator { background: var(--flight); }
.type-Hotel .type-indicator { background: var(--hotel); }
.type-Home .type-indicator { background: var(--home); }
.type-Transit .type-indicator { background: var(--transit); }
.type-Unknown .type-indicator { background: var(--unknown); opacity: 0.5; }

.trip-main { flex: 1; }

.trip-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.trip-title .badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
}

.badge-cruise { background: var(--cruise); color: #fff; }
.badge-flight { background: var(--flight); color: #fff; }
.badge-hotel { background: var(--hotel); color: #000; }
.badge-home { background: var(--home); color: #000; }
.badge-transit { background: var(--transit); color: #000; }
.badge-unknown { background: var(--unknown); color: #000; }
.badge-unverified { background: var(--unverified); color: #fff; }

.trip-dates {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.trip-details {
  font-size: 13px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 4px 16px;
}

.trip-details .field { display: flex; gap: 6px; }
.trip-details .field-label { color: var(--text-muted); white-space: nowrap; }
.trip-details .field-value { color: var(--text); }

.trip-notes {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  font-style: italic;
}

.trip-meta {
  text-align: right;
  white-space: nowrap;
}

.trip-meta .booking-ref {
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 12px;
  color: var(--cruise);
  background: rgba(56, 139, 253, 0.1);
  padding: 2px 6px;
  border-radius: 4px;
}

.trip-meta .confidence {
  font-size: 11px;
  margin-top: 4px;
}

.confidence-high { color: var(--home); }
.confidence-medium { color: var(--unknown); }
.confidence-low { color: var(--unverified); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

@media (max-width: 768px) {
  .trip-card { grid-template-columns: 4px 1fr; }
  .trip-meta { display: none; }
  .trip-details { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🌍 Travel Timeline - Data Review</h1>
    <div class="meta">Verification dashboard for Gmail-scraped booking data</div>
  </div>
  <div>
    <a href="data.json" target="_blank">📥 Raw JSON (data.json)</a>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search trips, cities, carriers...">
  <select id="filter-year">
    <option value="">All Years</option>
    <option value="2022">2022</option>
    <option value="2023">2023</option>
    <option value="2024">2024</option>
    <option value="2025">2025</option>
    <option value="2026">2026</option>
  </select>
  <select id="filter-type">
    <option value="">All Types</option>
    <option value="Cruise">Cruise</option>
    <option value="Flight">Flight</option>
    <option value="Hotel">Hotel</option>
    <option value="Home">Home</option>
    <option value="Transit">Transit</option>
    <option value="Unknown">Unknown</option>
  </select>
  <select id="filter-country">
    <option value="">All Countries</option>
  </select>
  <select id="filter-verified">
    <option value="">All</option>
    <option value="true">Verified Only</option>
    <option value="false">Unverified Only</option>
  </select>
</div>

<div class="stats" id="stats"></div>

<div class="timeline" id="timeline">
  <div class="loading">Loading travel data...</div>
</div>

<script>
let allTrips = [];
let allEvents = [];

async function loadData() {
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    allTrips = data.trips || [];
    allEvents = data.events || [];
    populateFilters();
    renderStats();
    renderTimeline();
  } catch (e) {
    document.getElementById('timeline').innerHTML = 
      '<div class="empty-state">Failed to load data.json: ' + e.message + '</div>';
  }
}

function populateFilters() {
  const countries = new Set();
  allTrips.forEach(t => {
    if (t.StartCountryCode) countries.add(t.StartCountryCode);
    if (t.EndCountryCode) countries.add(t.EndCountryCode);
  });
  const sel = document.getElementById('filter-country');
  [...countries].sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

function renderStats() {
  const verified = allTrips.filter(t => t.Verified).length;
  const unverified = allTrips.filter(t => !t.Verified).length;
  const cruises = allTrips.filter(t => t.Type === 'Cruise').length;
  const countries = new Set();
  allTrips.forEach(t => {
    if (t.StartCountryCode && t.Type !== 'Unknown' && t.Type !== 'Home') countries.add(t.StartCountryCode);
    if (t.EndCountryCode && t.Type !== 'Unknown' && t.Type !== 'Home') countries.add(t.EndCountryCode);
  });
  const unaccounted = allTrips.reduce((s, t) => s + (t.DaysUnaccounted || 0), 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="value">${allTrips.length}</div><div class="label">Total Entries</div></div>
    <div class="stat-card"><div class="value" style="color:var(--home)">${verified}</div><div class="label">Verified</div></div>
    <div class="stat-card"><div class="value" style="color:var(--unverified)">${unverified}</div><div class="label">Unverified</div></div>
    <div class="stat-card"><div class="value" style="color:var(--cruise)">${cruises}</div><div class="label">Cruises</div></div>
    <div class="stat-card"><div class="value">${countries.size}</div><div class="label">Countries</div></div>
    <div class="stat-card"><div class="value" style="color:var(--unknown)">${unaccounted}</div><div class="label">Days Unaccounted</div></div>
  `;
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const year = document.getElementById('filter-year').value;
  const type = document.getElementById('filter-type').value;
  const country = document.getElementById('filter-country').value;
  const verified = document.getElementById('filter-verified').value;

  return allTrips.filter(t => {
    if (year && !t.StartDate.startsWith(year)) return false;
    if (type && t.Type !== type) return false;
    if (country && t.StartCountryCode !== country && t.EndCountryCode !== country) return false;
    if (verified === 'true' && !t.Verified) return false;
    if (verified === 'false' && t.Verified) return false;
    if (search) {
      const hay = [t.Title, t.StartCity, t.EndCity, t.Carrier, t.BookingRef, t.Notes, t.TripId]
        .join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function renderTimeline() {
  const trips = getFiltered();
  if (trips.length === 0) {
    document.getElementById('timeline').innerHTML = '<div class="empty-state">No trips match filters</div>';
    return;
  }

  document.getElementById('timeline').innerHTML = trips.map(t => {
    const badgeClass = 'badge-' + t.Type.toLowerCase();
    const unverifiedClass = !t.Verified ? 'unverified' : '';
    const lowConfClass = t.Confidence === 'low' ? 'low-confidence' : '';

    const days = Math.ceil((new Date(t.EndDate) - new Date(t.StartDate)) / 86400000) + 1;

    let details = '';
    if (t.StartCity || t.EndCity) {
      details += `<div class="field"><span class="field-label">Route:</span><span class="field-value">${t.StartCity || '?'} → ${t.EndCity || '?'}</span></div>`;
    }
    if (t.StartCountryCode || t.EndCountryCode) {
      const route = t.StartCountryCode === t.EndCountryCode ? t.StartCountryCode : `${t.StartCountryCode || '?'} → ${t.EndCountryCode || '?'}`;
      details += `<div class="field"><span class="field-label">Country:</span><span class="field-value">${route}</span></div>`;
    }
    if (t.Carrier) details += `<div class="field"><span class="field-label">Carrier:</span><span class="field-value">${t.Carrier}</span></div>`;
    if (t.TransportMode && t.TransportMode !== 'Unknown') details += `<div class="field"><span class="field-label">Mode:</span><span class="field-value">${t.TransportMode}</span></div>`;
    if (t.Companions && t.Companions.length) details += `<div class="field"><span class="field-label">With:</span><span class="field-value">${t.Companions.join(', ')}</span></div>`;
    if (t.DaysUnaccounted > 0) details += `<div class="field"><span class="field-label">Unaccounted:</span><span class="field-value" style="color:var(--unverified)">${t.DaysUnaccounted} days</span></div>`;

    return `
      <div class="trip-card type-${t.Type} ${unverifiedClass} ${lowConfClass}">
        <div class="type-indicator"></div>
        <div class="trip-main">
          <div class="trip-title">
            ${t.Title}
            <span class="badge ${badgeClass}">${t.Type}</span>
            ${!t.Verified ? '<span class="badge badge-unverified">Unverified</span>' : ''}
          </div>
          <div class="trip-dates">${t.StartDate} to ${t.EndDate} (${days} day${days > 1 ? 's' : ''})</div>
          <div class="trip-details">${details}</div>
          ${t.Notes ? `<div class="trip-notes">${t.Notes}</div>` : ''}
        </div>
        <div class="trip-meta">
          ${t.BookingRef ? `<div class="booking-ref">${t.BookingRef}</div>` : ''}
          <div class="confidence confidence-${t.Confidence}">${t.Confidence}</div>
        </div>
      </div>
    `;
  }).join('');
}

// Event listeners
document.getElementById('search').addEventListener('input', renderTimeline);
document.getElementById('filter-year').addEventListener('change', renderTimeline);
document.getElementById('filter-type').addEventListener('change', renderTimeline);
document.getElementById('filter-country').addEventListener('change', renderTimeline);
document.getElementById('filter-verified').addEventListener('change', renderTimeline);

loadData();
</script>
</body>
</html>
