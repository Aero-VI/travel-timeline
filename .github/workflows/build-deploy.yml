name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge trip data into data.json
        run: |
          echo '{"trips":' > _site_data.json
          # Merge all trip JSON arrays into one
          find data/trips -name '*.json' -print0 | sort -z | xargs -0 cat | jq -s 'flatten | sort_by(.StartDate)' >> _site_data.json
          echo ',"events":' >> _site_data.json
          cat data/events/events.json >> _site_data.json
          echo '}' >> _site_data.json
          # Validate JSON
          jq . _site_data.json > /dev/null
          # Move to site root
          mv _site_data.json data.json
          echo "Built data.json with $(jq '.trips | length' data.json) trips"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp data.json _site/
          cp -r css _site/ 2>/dev/null || true
          cp -r js _site/ 2>/dev/null || true
          cp CNAME _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
